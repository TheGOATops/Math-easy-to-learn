<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Game Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0b0c10; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        h1 { color: #66fcf1; font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; }
        p { color: #a0aec0; margin-bottom: 40px; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; width: 100%; }
        .card { background: #1f2833; border: 2px solid #45a29e; border-radius: 12px; padding: 35px; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-5px); background: #2f3b4c; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-color: #66fcf1; }
        .icon { font-size: 3.5rem; margin-bottom: 15px; }
        .title { font-size: 1.5rem; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .desc { font-size: 1rem; color: #a0aec0; }
    </style>
</head>
<body>

    <h1>🎮 Custom Game Dashboard</h1>
    <p>Launch your favorite games instantly in a clean browser window.</p>

    <div class="grid">
        <!-- Escape Road 3 -->
        <a class="card" href="https://github.io" target="_blank">
            <div class="icon">🚗</div>
            <div class="title">Escape Road 3</div>
            <div class="desc">Play the endless getaway driving game.</div>
        </a>

        <!-- Slope 3D -->
        <a class="card" href="https://slopeonlinegame.github.io/" target="_blank">
            <div class="icon">🟢</div>
            <div class="title">Slope 3D</div>
            <div class="desc">Control the rolling ball down the neon platforms.</div>
        </a>

        <!-- Arcade Hub -->
        <a class="card" href="https://freeunblockedgames.online" target="_blank">
            <div class="icon">🕹️</div>
            <div class="title">Arcade Hub</div>
            <div class="desc">Access a massive library of mini-games.</div>
        </a>
    </div>

</body>
</html>
